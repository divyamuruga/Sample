<h3>Routes</h3>

<table>

<tr>
<th>Show</th>
<th>Color</th>
<th>Route</th>
<th>Days</th>
</tr>

<tr *ngFor="let r of routes">

<td>
<input type="checkbox" [(ngModel)]="r.visible">
</td>

<td>
<div [style.background]="r.color" style="width:20px;height:20px"></div>
</td>

<td>{{r.name}}</td>

<td>{{r.days}}</td>

</tr>

</table>
